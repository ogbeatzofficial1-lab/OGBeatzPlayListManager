<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background radial gradient for brushed metal/dark carbon core -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#27272a" />
      <stop offset="65%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </radialGradient>
    
    <!-- Vibrant classic industrial orange gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>

    <!-- Sleek drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Deep dark industrial background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#27272a" stroke-width="4" />
  
  <!-- Outer glowing/distressed circle rings -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#orangeGrad)" stroke-width="12" filter="url(#shadow)" />
  <circle cx="256" cy="256" r="202" fill="none" stroke="#ffffff" stroke-dasharray="10,8" stroke-width="3" opacity="0.4" />
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#orangeGrad)" stroke-width="3" opacity="0.6" />

  <!-- Inner Dark Core Container -->
  <circle cx="256" cy="256" r="176" fill="#18181b" stroke="#27272a" stroke-width="2" />

  <!-- Stylized "OG" Text -->
  <text x="256" y="210" 
        font-family="'Space Grotesk', 'Inter', 'Impact', 'Arial Black', sans-serif" 
        font-size="124" 
        font-weight="900" 
        fill="#ffffff" 
        text-anchor="middle" 
        letter-spacing="2"
        filter="url(#shadow)">OG</text>

  <!-- Orange Badge/Banner behind "BEATZ" to resemble the graphic design banner -->
  <rect x="76" y="234" width="360" height="76" rx="14" fill="url(#orangeGrad)" filter="url(#shadow)" stroke="#18181b" stroke-width="4" />

  <!-- "BEATZ" Text inside the orange badge -->
  <text x="256" y="290" 
        font-family="'Space Grotesk', 'Inter', 'Impact', 'Arial Black', sans-serif" 
        font-size="52" 
        font-weight="900" 
        fill="#121214" 
        text-anchor="middle" 
        letter-spacing="6">BEATZ</text>

  <!-- Left Note -->
  <g transform="translate(142, 350) scale(1.1)" fill="url(#orangeGrad)">
    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V6h6V3h-8z"/>
  </g>

  <!-- Right Note -->
  <g transform="translate(320, 350) scale(1.1)" fill="url(#orangeGrad)">
    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V6h6V3h-8z"/>
  </g>

  <!-- Waveform lines in the center bottom representing frequency -->
  <path d="M 195 385 L 205 385 L 210 375 L 215 395 L 222 360 L 229 410 L 236 350 L 243 422 L 250 330 L 257 442 L 264 330 L 271 422 L 278 350 L 285 410 L 292 360 L 299 395 L 304 375 L 309 385 L 319 385" 
        fill="none" 
        stroke="url(#orangeGrad)" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>
